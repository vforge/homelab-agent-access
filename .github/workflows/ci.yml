name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: Shell validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run local tests
        run: make test

      - name: Run ShellCheck
        shell: bash
        run: |
          set +e
          make lint 2>&1 | tee "$RUNNER_TEMP/shellcheck.log"
          rc=${PIPESTATUS[0]}
          set -e
          if (( rc != 0 )); then
            summary="$(tail -n 30 "$RUNNER_TEMP/shellcheck.log" | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
            echo "::error::$summary"
            exit "$rc"
          fi
