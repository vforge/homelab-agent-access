name: Bug report
description: Report a reproducible problem with the scripts or documentation.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include real hostnames, addresses, usernames, keys, credentials,
        private paths, or sensitive logs. Use a disposable target and generic
        examples.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide safe commands and target details using placeholders.
      placeholder: |
        ./bin/ssh-readonly-user/list root@server --json
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS/tool versions only; omit machine-identifying data.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List tests run, such as `make test` or a disposable-host test.
